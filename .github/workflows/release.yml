name: Publish release

on:
  push:
    branches: [main]
    paths:
      - custom_components/cast_attribute_sensors/**
      - hacs.json
      - CHANGELOG.md
      - .github/workflows/release.yml
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

concurrency:
  group: publish-cast-metadata-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify version consistency and build HACS asset
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import ast
          import json
          import re
          import zipfile
          from pathlib import Path

          component = Path("custom_components/cast_attribute_sensors")
          manifest = json.loads((component / "manifest.json").read_text())
          module = ast.parse((component / "const.py").read_text())
          const_version = next(
              node.value.value
              for node in module.body
              if isinstance(node, ast.AnnAssign)
              and getattr(node.target, "id", None) == "VERSION"
              and isinstance(node.value, ast.Constant)
          )
          heading = re.search(
              r"^## ([0-9]+\.[0-9]+\.[0-9]+)$",
              Path("CHANGELOG.md").read_text(),
              re.M,
          )
          if heading is None:
              raise SystemExit("CHANGELOG.md has no semantic-version heading")

          hacs = json.loads(Path("hacs.json").read_text())
          versions = {manifest["version"], const_version, heading.group(1)}
          if len(versions) != 1:
              raise SystemExit(f"Version mismatch: {sorted(versions)}")
          if hacs.get("zip_release") is not True:
              raise SystemExit("hacs.json must enable zip_release")
          if hacs.get("filename") != "cast_attribute_sensors.zip":
              raise SystemExit("Unexpected HACS ZIP filename")

          asset = Path(hacs["filename"])
          with zipfile.ZipFile(asset, "w", zipfile.ZIP_DEFLATED) as archive:
              for path in sorted(component.rglob("*")):
                  if path.is_file() and "__pycache__" not in path.parts:
                      archive.write(path, path.relative_to(component))

          with zipfile.ZipFile(asset) as archive:
              names = set(archive.namelist())
          required = {"__init__.py", "manifest.json", "const.py"}
          if not required.issubset(names):
              raise SystemExit(
                  f"Release ZIP is missing component files: {sorted(required - names)}"
              )

          version = manifest["version"]
          print(f"version={version}")
          print(f"tag=v{version}")
          print(f"asset={asset}")
          PY

      - name: Build release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          awk -v version="$VERSION" '
            $0 == "## " version {flag=1; next}
            /^## / && flag {exit}
            flag
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            printf 'Cast Metadata & TV Controls %s\n' "$VERSION" > release-notes.md
          fi

      - name: Create or repair latest GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Cast Metadata & TV Controls ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: ${{ steps.version.outputs.asset }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true

      - name: Verify published release and HACS asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          ASSET: ${{ steps.version.outputs.asset }}
        run: |
          set -euo pipefail
          test "$(gh release view "$TAG" --json isDraft --jq '.isDraft')" = "false"
          test "$(gh release view "$TAG" --json isPrerelease --jq '.isPrerelease')" = "false"
          gh release view "$TAG" --json assets --jq '.assets[].name' | grep -Fx "$ASSET"
          rm -rf /tmp/cast-release
          mkdir -p /tmp/cast-release
          gh release download "$TAG" -p "$ASSET" -D /tmp/cast-release --clobber
          cmp "$ASSET" "/tmp/cast-release/$ASSET"
