name: Apply reviewed v8.2 fixes

on:
  push:
    branches:
      - fix/v8.2.0-remote-apps-artwork

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v8.2.0-remote-apps-artwork
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Apply source fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"Expected block not found in {path}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1))

          init_path = "custom_components/cast_attribute_sensors/__init__.py"
          replace(
              init_path,
              "from .source_manager import SourceManager\n\nPLATFORMS: list[Platform] = [",
              "from .source_manager import SourceManager\nfrom .v81_patch import install_v81_patches\n\n# Activate the hardware-evidence, identity, and registry reconciliation layer.\ninstall_v81_patches()\n\nPLATFORMS: list[Platform] = [",
          )

          replace(
              init_path,
              '''            if entity_id in runtime.controllers:\n                controller = _controller(runtime, entity_id)\n                source_id = next(\n                    (\n                        source_id\n                        for source_id in controller.group.source_ids\n                        if manager.platform(source_id) == ANDROID_TV_REMOTE_DOMAIN\n                    ),\n                    None,\n                )\n            else:\n                source_id = manager.source_id_for_entity(entity_id)\n            if (\n                source_id is None\n                or manager.platform(source_id) != ANDROID_TV_REMOTE_DOMAIN\n            ):\n''',
              '''            if entity_id in runtime.controllers:\n                source_ids = _controller(runtime, entity_id).group.source_ids\n                source_id = manager.android_tv_remote_source_id(source_ids)\n            else:\n                source_id = manager.source_id_for_entity(entity_id)\n                if manager.platform(source_id) != ANDROID_TV_REMOTE_DOMAIN:\n                    source_id = manager.android_tv_remote_source_id(\n                        (source_id,) if source_id else ()\n                    )\n            if source_id is None:\n''',
          )

          replace(
              init_path,
              '''            remote_id = next(\n                (\n                    source_id\n                    for source_id in source_ids\n                    if manager.platform(source_id) == ANDROID_TV_REMOTE_DOMAIN\n                ),\n                None,\n            )\n''',
              '''            remote_id = manager.android_tv_remote_source_id(source_ids)\n''',
          )

          source_path = "custom_components/cast_attribute_sensors/source_manager.py"
          replace(
              source_path,
              '''    def remote_entity_id(self, source_ids: tuple[str, ...]) -> str | None:\n        for source_id in source_ids:\n            source = self._sources.get(source_id)\n            if (\n                source is None\n                or source.platform != ANDROID_TV_REMOTE_DOMAIN\n                or source.config_entry_id is None\n            ):\n                continue\n            for entry in self.entity_registry.entities.values():\n                if (\n                    entry.domain == REMOTE_DOMAIN\n                    and entry.platform == ANDROID_TV_REMOTE_DOMAIN\n                    and entry.config_entry_id == source.config_entry_id\n                ):\n                    return entry.entity_id\n        return None\n''',
              '''    def remote_entity_id(self, source_ids: tuple[str, ...]) -> str | None:\n        \"\"\"Resolve the Android TV remote linked to one physical TV safely.\"\"\"\n        sources = [\n            source\n            for source_id in source_ids\n            if (source := self._sources.get(source_id)) is not None\n        ]\n        config_entry_ids = {\n            source.config_entry_id for source in sources if source.config_entry_id\n        }\n        device_ids = {source.device_id for source in sources if source.device_id}\n        source_devices = [\n            device\n            for device_id in device_ids\n            if (device := self.device_registry.async_get(device_id)) is not None\n        ]\n        connections = {\n            connection\n            for device in source_devices\n            for connection in device.connections\n        }\n        areas = {device.area_id for device in source_devices if device.area_id}\n\n        candidates: list[tuple[int, str]] = []\n        for entry in self.entity_registry.entities.values():\n            if (\n                entry.domain != REMOTE_DOMAIN\n                or entry.platform != ANDROID_TV_REMOTE_DOMAIN\n                or entry.disabled_by is not None\n            ):\n                continue\n            score = 0\n            if entry.device_id in device_ids:\n                score = max(score, 120)\n            if entry.config_entry_id in config_entry_ids:\n                score = max(score, 100)\n            device = (\n                self.device_registry.async_get(entry.device_id)\n                if entry.device_id is not None\n                else None\n            )\n            if device is not None and connections & set(device.connections):\n                score = max(score, 110)\n            if device is not None and device.area_id in areas:\n                score = max(score, 20)\n            candidates.append((score, entry.entity_id))\n\n        if not candidates:\n            return None\n        best_score = max(score for score, _ in candidates)\n        if best_score > 0:\n            best = [entity_id for score, entity_id in candidates if score == best_score]\n            return best[0] if len(best) == 1 else None\n        return candidates[0][1] if len(candidates) == 1 else None\n\n    def android_tv_remote_source_id(\n        self, source_ids: tuple[str, ...]\n    ) -> str | None:\n        \"\"\"Resolve the companion Android TV Remote media player.\"\"\"\n        direct = next(\n            (\n                source_id\n                for source_id in source_ids\n                if self.platform(source_id) == ANDROID_TV_REMOTE_DOMAIN\n            ),\n            None,\n        )\n        if direct is not None:\n            return direct\n\n        remote_entity_id = self.remote_entity_id(source_ids)\n        remote_entry = (\n            self.entity_registry.async_get(remote_entity_id)\n            if remote_entity_id is not None\n            else None\n        )\n        matches = [\n            source.registry_id\n            for source in self._sources.values()\n            if source.platform == ANDROID_TV_REMOTE_DOMAIN\n            and source.entity_id is not None\n            and remote_entry is not None\n            and (\n                source.config_entry_id == remote_entry.config_entry_id\n                or (\n                    source.device_id is not None\n                    and source.device_id == remote_entry.device_id\n                )\n            )\n        ]\n        if len(matches) == 1:\n            return matches[0]\n\n        available = [\n            source.registry_id\n            for source in self._sources.values()\n            if source.platform == ANDROID_TV_REMOTE_DOMAIN\n            and source.entity_id is not None\n        ]\n        return available[0] if len(available) == 1 else None\n''',
          )

          media_path = "custom_components/cast_attribute_sensors/media_player.py"
          replace(
              media_path,
              '''            "managed_apps": self.app_catalog(),\n            **details,\n''',
              '''            "managed_apps": self.app_catalog(),\n            "remote_available": self.runtime.manager.remote_entity_id(\n                self.group.source_ids\n            )\n            is not None,\n            **details,\n''',
          )

          replace(
              media_path,
              '''    @property\n    def media_image_url(self) -> str | None:\n        return self._string_attribute("entity_picture")\n''',
              '''    @property\n    def media_image_url(self) -> str | None:\n        \"\"\"Return artwork from the active source, with source-level fallbacks.\"\"\"\n        states = [self._active_state()]\n        states.extend(\n            self.runtime.manager.get_state(source_id)\n            for source_id in self.group.source_ids\n        )\n        companion = self.runtime.manager.android_tv_remote_source_id(\n            self.group.source_ids\n        )\n        if companion is not None:\n            states.append(self.runtime.manager.get_state(companion))\n        for state in states:\n            if state is None:\n                continue\n            for attribute in ("entity_picture", "media_image_url"):\n                value = state.attributes.get(attribute)\n                if isinstance(value, str) and value.strip():\n                    return value.strip()\n        return None\n''',
          )

          replace(
              media_path,
              '''    def _raw_actions(self) -> list[SourceAction]:\n        actions: list[SourceAction] = []\n        native_names: set[str] = set()\n        for source_id in self._category_ids(ROUTE_TV_APPS, cast=False):\n            if self.runtime.manager.platform(source_id) != ANDROID_TV_REMOTE_DOMAIN:\n                continue\n            for app_id, name in self.runtime.manager.tv_apps(source_id).items():\n                if not _is_transient_app(name):\n                    actions.append(SourceAction("tv_app", source_id, app_id, _action_key("tv_app", app_id), name))\n                    native_names.add(name.casefold().strip())\n        for source_id in self._category_ids(ROUTE_TV_APPS, cast=False):\n''',
              '''    def _raw_actions(self) -> list[SourceAction]:\n        actions: list[SourceAction] = []\n        native_names: set[str] = set()\n        tv_app_sources = list(self._category_ids(ROUTE_TV_APPS, cast=False))\n        companion = self.runtime.manager.android_tv_remote_source_id(\n            self.group.source_ids\n        )\n        if companion is not None and companion not in tv_app_sources:\n            tv_app_sources.append(companion)\n        for source_id in tv_app_sources:\n            if self.runtime.manager.platform(source_id) != ANDROID_TV_REMOTE_DOMAIN:\n                continue\n            for app_id, name in self.runtime.manager.tv_apps(source_id).items():\n                if not _is_transient_app(name):\n                    actions.append(SourceAction("tv_app", source_id, app_id, _action_key("tv_app", app_id), name))\n                    native_names.add(name.casefold().strip())\n        for source_id in tv_app_sources:\n''',
          )

          replace(
              media_path,
              '''        for source_id in self._category_ids(ROUTE_CAST_APPS, cast=True):\n            for app_id, name in self.runtime.manager.cast_apps(source_id).items():\n                actions.append(SourceAction("cast_app", source_id, app_id, _action_key("cast_app", app_id), name))\n''',
              '''        cast_names: set[str] = set()\n        for source_id in self._category_ids(ROUTE_CAST_APPS, cast=True):\n            for app_id, name in self.runtime.manager.cast_apps(source_id).items():\n                normalized = name.casefold().strip()\n                if _is_transient_app(name) or normalized in cast_names:\n                    continue\n                cast_names.add(normalized)\n                actions.append(SourceAction("cast_app", source_id, app_id, _action_key("cast_app", app_id), name))\n''',
          )

          replace(
              media_path,
              '''            if isinstance(app_id, str):\n                for option, action in actions.items():\n                    if action.kind == "cast_app" and action.source_id == active_cast and action.value == app_id:\n                        return option\n        for source_id in self._source_ids(cast=False):\n''',
              '''            if isinstance(app_id, str):\n                for option, action in actions.items():\n                    if action.kind == "cast_app" and action.source_id == active_cast and action.value == app_id:\n                        return option\n            app_name = state.attributes.get("app_name") if state else None\n            if isinstance(app_name, str):\n                for option, action in actions.items():\n                    if (\n                        action.kind == "cast_app"\n                        and action.source_id == active_cast\n                        and self._display_name(action).casefold() == app_name.casefold()\n                    ):\n                        return option\n        native_source_ids = list(self._source_ids(cast=False))\n        companion = self.runtime.manager.android_tv_remote_source_id(\n            self.group.source_ids\n        )\n        if companion is not None and companion not in native_source_ids:\n            native_source_ids.append(companion)\n        for source_id in native_source_ids:\n''',
          )

          const_path = Path("custom_components/cast_attribute_sensors/const.py")
          const_path.write_text(const_path.read_text().replace('VERSION: Final = "8.1.0"', 'VERSION: Final = "8.2.0"', 1))
          manifest_path = Path("custom_components/cast_attribute_sensors/manifest.json")
          manifest = json.loads(manifest_path.read_text())
          manifest["version"] = "8.2.0"
          manifest_path.write_text(json.dumps(manifest, indent=2) + "\n")

          changelog = Path("CHANGELOG.md")
          text = changelog.read_text()
          heading = '''## 8.2.0\n\n- Fixed the V8.1 hardware-evidence and registry-reconciliation layer not being activated at integration startup.\n- Added safe Android TV Remote discovery through matching config entries, devices, connections, areas, and an unambiguous single-device fallback.\n- Restored directional controls, Home, Back, Settings, native application launch, and application registration when the Android TV media player was not originally inside the physical group.\n- Added companion Android TV app discovery to the unified controller and deduplicated learned Cast receiver IDs that represent the same application.\n- Added artwork fallback across `entity_picture`, `media_image_url`, every grouped source, and the linked Android TV source.\n- Added a `remote_available` controller attribute for dashboard clients and regression checks that prevent another dormant-patch release.\n\n'''
          changelog.write_text(text.replace("# Changelog\n\n", "# Changelog\n\n" + heading, 1))

          Path("tests/test_v82_activation.py").write_text('''\"\"\"Release regressions that do not require importing Home Assistant.\"\"\"\n\nfrom pathlib import Path\nimport json\nimport unittest\n\nROOT = Path(__file__).parents[1]\nCOMPONENT = ROOT / "custom_components" / "cast_attribute_sensors"\n\n\nclass V82ActivationTests(unittest.TestCase):\n    def test_runtime_patch_is_activated(self) -> None:\n        source = (COMPONENT / "__init__.py").read_text()\n        self.assertIn("install_v81_patches()", source)\n\n    def test_remote_and_artwork_fallbacks_are_present(self) -> None:\n        manager = (COMPONENT / "source_manager.py").read_text()\n        player = (COMPONENT / "media_player.py").read_text()\n        self.assertIn("android_tv_remote_source_id", manager)\n        self.assertIn("remote_available", player)\n        self.assertIn('("entity_picture", "media_image_url")', player)\n\n    def test_release_versions_match(self) -> None:\n        manifest = json.loads((COMPONENT / "manifest.json").read_text())\n        const = (COMPONENT / "const.py").read_text()\n        self.assertEqual(manifest["version"], "8.2.0")\n        self.assertIn('VERSION: Final = "8.2.0"', const)\n\n\nif __name__ == "__main__":\n    unittest.main()\n''')

          Path(".github/workflows/apply-v82.yml").unlink()
          PY
      - name: Validate generated changes
        run: |
          python -m compileall -q custom_components
          python -m unittest discover -s tests -v
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release v8.2.0: restore remote, app and artwork routing"
          git push origin HEAD:fix/v8.2.0-remote-apps-artwork
