name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: description topics

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install ruff pyyaml
      - run: ruff check custom_components tests
      - run: python -m compileall -q custom_components
      - name: Run unit tests and capture output
        run: |
          set +e
          python -m unittest discover -s tests -v > unit-tests.txt 2>&1
          echo $? > unit-tests.status
          exit 0
      - name: Upload unit-test output
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-output
          path: |
            unit-tests.txt
            unit-tests.status
      - name: Enforce unit-test result
        run: test "$(cat unit-tests.status)" = "0"
      - name: Validate versions, JSON, and YAML
        run: |
          python - <<'PY'
          import ast
          import json
          import re
          from pathlib import Path

          import yaml

          for path in Path('.').rglob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))
          for path in Path('.').rglob('*.yaml'):
              yaml.safe_load(path.read_text(encoding='utf-8'))
          for path in Path('.').rglob('*.yml'):
              yaml.safe_load(path.read_text(encoding='utf-8'))

          manifest = json.loads(
              Path('custom_components/cast_attribute_sensors/manifest.json').read_text()
          )
          module = ast.parse(
              Path('custom_components/cast_attribute_sensors/const.py').read_text()
          )
          const_version = next(
              node.value.value
              for node in module.body
              if isinstance(node, ast.AnnAssign)
              and getattr(node.target, 'id', None) == 'VERSION'
              and isinstance(node.value, ast.Constant)
          )
          heading = re.search(
              r'^## ([0-9]+\.[0-9]+\.[0-9]+)$',
              Path('CHANGELOG.md').read_text(),
              re.M,
          )
          if heading is None:
              raise SystemExit('CHANGELOG.md has no semantic-version heading')
          versions = {manifest['version'], const_version, heading.group(1)}
          if len(versions) != 1:
              raise SystemExit(f'Version mismatch: {sorted(versions)}')
          PY
