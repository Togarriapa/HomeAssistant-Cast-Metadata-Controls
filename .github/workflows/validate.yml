name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  apply-v75:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v7.5.0
          fetch-depth: 0
      - name: Replace staging tree with reviewed source
        run: |
          test -f .release/v75_payload.tgz
          tar -xzf .release/v75_payload.tgz -C "$GITHUB_WORKSPACE"
          rm -f .release/v75_payload.tgz .github/workflows/apply-v75.yml
          rmdir .release 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release v7.5.0 resilience and self-healing"
          git push origin HEAD:release/v7.5.0

  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: description topics

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install ruff pyyaml
      - run: ruff check custom_components tests
      - run: python -m compileall -q custom_components
      - run: python -m unittest discover -s tests -v
      - name: Validate JSON and YAML
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml

          for path in Path('.').rglob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))
          for path in Path('.').rglob('*.yaml'):
              yaml.safe_load(path.read_text(encoding='utf-8'))
          for path in Path('.').rglob('*.yml'):
              yaml.safe_load(path.read_text(encoding='utf-8'))
          PY
