name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: description topics

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install ruff pyyaml
      - name: Capture Ruff diagnostics
        run: |
          ruff check custom_components tests --output-format=concise > ruff-results.txt 2>&1 || true
          ruff check custom_components tests --fix || true
          git diff > ruff-fixes.patch
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostics
          path: |
            ruff-results.txt
            ruff-fixes.patch
      - run: ruff check custom_components tests
      - run: python -m compileall -q custom_components
      - run: python -m unittest discover -s tests -v
      - name: Validate JSON and YAML
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml

          for path in Path('.').rglob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))
          for path in Path('.').rglob('*.yaml'):
              yaml.safe_load(path.read_text(encoding='utf-8'))
          for path in Path('.').rglob('*.yml'):
              yaml.safe_load(path.read_text(encoding='utf-8'))
          PY
