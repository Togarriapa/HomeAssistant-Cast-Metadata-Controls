name: Apply v7.5 source

on:
  push:
    branches:
      - main
    paths:
      - .release/v75_payload.tgz
      - .github/workflows/apply-v75.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply reviewed source bundle
        run: |
          test -f .release/v75_payload.tgz
          tar -xzf .release/v75_payload.tgz -C "$GITHUB_WORKSPACE"
          rm -f .release/v75_payload.tgz .github/workflows/apply-v75.yml
          rmdir .release 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release v7.5.0 resilience and self-healing"
          git push origin HEAD:main
