name: Apply V8.3 generic setup metadata

on:
  push:
    branches:
      - fix/v8.3.0-generic-capability-routing
    paths:
      - .github/workflows/apply-generic-v830.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v8.3.0-generic-capability-routing
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Update localized setup metadata
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          component = Path('custom_components/cast_attribute_sensors')
          changelog_path = Path('CHANGELOG.md')
          changelog = changelog_path.read_text()
          entry = '''## 8.3.0

- Replaced the vendor-specific remote assumption with an explicit physical-device entity inventory.
- Added **Configure physical device entities** so every media player, remote and restart button belonging to one television can be selected together.
- Added generic automatic provider selection for navigation and restart using the configured inventory, entity domain, availability, device, config-entry, area, device class and name evidence.
- Added manual entity-provider overrides for ambiguous installations with several TVs or remotes.
- Added a user-defined logical remote-command map, avoiding manufacturer and integration command names in the backend.
- Added generic application/input discovery from any non-Cast media player's `source_list`; likely physical inputs remain inputs and other selectable sources appear as TV applications.
- Exposed linked entities and selected providers in controller diagnostics.
- Preserved linked entities, provider overrides and command mappings across merge, edit, unmerge and cleanup operations.
- Added regression coverage for source classification, command passthrough, activation and version consistency.

'''
          if '## 8.3.0\n' not in changelog:
              changelog_path.write_text(changelog.replace('# Changelog\n\n', '# Changelog\n\n' + entry, 1))

          en_steps = {
              'configure_device_entities': {
                  'title': 'Configure physical device entities',
                  'description': 'Choose the physical controller whose complete Home Assistant entity inventory should be configured.',
                  'data': {'group_key': 'Physical device'},
              },
              'device_entities_group': {
                  'title': 'Entities belonging to {name}',
                  'description': 'Select every supported entity that represents this same physical device: all media players, remote entities and restart buttons. The integration will build a persistent physical-device group and automatically choose the best provider for each capability.',
                  'data': {
                      'name': 'Physical device name',
                      'entities': 'Entities belonging to this physical device',
                  },
              },
              'configure_entity_providers': {
                  'title': 'Override entity providers',
                  'description': 'Choose a physical controller. Automatic selection is recommended; overrides are only needed when several linked entities can provide the same capability.',
                  'data': {'group_key': 'Physical device'},
              },
              'entity_provider_group': {
                  'title': 'Entity providers for {name}',
                  'description': 'Select Automatic unless the integration cannot unambiguously choose among the entities configured for this physical device.',
                  'data': {
                      'navigation': 'Navigation remote',
                      'restart': 'Restart button',
                  },
              },
              'configure_remote_commands': {
                  'title': 'Configure remote commands',
                  'description': 'Choose a physical controller whose logical remote commands need provider-specific values.',
                  'data': {'group_key': 'Physical device'},
              },
              'remote_commands_group': {
                  'title': 'Remote commands for {name}',
                  'description': 'The controller sends logical commands. Keep the default values when the linked remote accepts them; otherwise enter the exact command expected by that remote provider. Supported logical commands: {commands}.',
                  'data': {
                      'HOME': 'Home command',
                      'BACK': 'Back command',
                      'SETTINGS': 'Settings command',
                      'DPAD_UP': 'Up command',
                      'DPAD_DOWN': 'Down command',
                      'DPAD_LEFT': 'Left command',
                      'DPAD_RIGHT': 'Right command',
                      'DPAD_CENTER': 'OK / Select command',
                  },
              },
          }
          pt_steps = {
              'configure_device_entities': {
                  'title': 'Configurar entidades do dispositivo físico',
                  'description': 'Escolha o controlador físico cujo inventário completo de entidades do Home Assistant pretende configurar.',
                  'data': {'group_key': 'Dispositivo físico'},
              },
              'device_entities_group': {
                  'title': 'Entidades pertencentes a {name}',
                  'description': 'Selecione todas as entidades suportadas que representam o mesmo dispositivo físico: todos os leitores multimédia, comandos remotos e botões de reinício. A integração cria um grupo persistente e escolhe automaticamente o melhor fornecedor para cada capacidade.',
                  'data': {
                      'name': 'Nome do dispositivo físico',
                      'entities': 'Entidades pertencentes a este dispositivo',
                  },
              },
              'configure_entity_providers': {
                  'title': 'Substituir fornecedores de entidades',
                  'description': 'Escolha um controlador físico. A seleção automática é recomendada; só é necessário substituir quando várias entidades associadas fornecem a mesma capacidade.',
                  'data': {'group_key': 'Dispositivo físico'},
              },
              'entity_provider_group': {
                  'title': 'Fornecedores de entidades de {name}',
                  'description': 'Mantenha Automático, exceto quando a integração não conseguir escolher inequivocamente entre as entidades configuradas para este dispositivo.',
                  'data': {
                      'navigation': 'Comando de navegação',
                      'restart': 'Botão de reinício',
                  },
              },
              'configure_remote_commands': {
                  'title': 'Configurar comandos remotos',
                  'description': 'Escolha o controlador físico cujos comandos lógicos precisam de valores específicos do fornecedor.',
                  'data': {'group_key': 'Dispositivo físico'},
              },
              'remote_commands_group': {
                  'title': 'Comandos remotos de {name}',
                  'description': 'O controlador envia comandos lógicos. Mantenha os valores predefinidos se o comando associado os aceitar; caso contrário, introduza o comando exato esperado pelo fornecedor. Comandos suportados: {commands}.',
                  'data': {
                      'HOME': 'Comando Início',
                      'BACK': 'Comando Voltar',
                      'SETTINGS': 'Comando Definições',
                      'DPAD_UP': 'Comando Cima',
                      'DPAD_DOWN': 'Comando Baixo',
                      'DPAD_LEFT': 'Comando Esquerda',
                      'DPAD_RIGHT': 'Comando Direita',
                      'DPAD_CENTER': 'Comando OK / Selecionar',
                  },
              },
          }

          for relative, steps, menu, error in (
              (
                  'strings.json', en_steps,
                  {
                      'configure_device_entities': 'Configure physical device entities',
                      'configure_entity_providers': 'Override entity providers',
                      'configure_remote_commands': 'Configure remote commands',
                  },
                  'Select at least one supported media_player entity.',
              ),
              (
                  'translations/en.json', en_steps,
                  {
                      'configure_device_entities': 'Configure physical device entities',
                      'configure_entity_providers': 'Override entity providers',
                      'configure_remote_commands': 'Configure remote commands',
                  },
                  'Select at least one supported media_player entity.',
              ),
              (
                  'translations/pt.json', pt_steps,
                  {
                      'configure_device_entities': 'Configurar entidades do dispositivo físico',
                      'configure_entity_providers': 'Substituir fornecedores de entidades',
                      'configure_remote_commands': 'Configurar comandos remotos',
                  },
                  'Selecione pelo menos uma entidade media_player suportada.',
              ),
          ):
              path = component / relative
              data = json.loads(path.read_text())
              options = data['options']
              options['step']['init']['menu_options'].update(menu)
              options['step'].update(steps)
              options.setdefault('error', {})['media_player_required'] = error
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n')

          Path('.github/workflows/apply-generic-v830.yml').unlink()
          PY
      - name: Commit generated metadata
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize v8.3.0 generic setup metadata'
          git push origin HEAD:fix/v8.3.0-generic-capability-routing
