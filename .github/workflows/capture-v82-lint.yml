name: Capture v8.2 lint diagnostics

on:
  push:
    branches:
      - fix/v8.2.0-remote-apps-artwork

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v8.2.0-remote-apps-artwork
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install ruff
      - run: ruff check custom_components tests > ruff-v82.txt 2>&1 || true
      - run: rm .github/workflows/capture-v82-lint.yml
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture v8.2 lint diagnostics"
          git push origin HEAD:fix/v8.2.0-remote-apps-artwork
