name: Apply v8.4 release metadata

on:
  push:
    branches:
      - release/v8.4.0-reliable-device-setup
    paths:
      - .github/workflows/apply-v840-metadata.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v8.4.0-reliable-device-setup
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply release metadata
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          component = Path('custom_components/cast_attribute_sensors')

          const_path = component / 'const.py'
          const = const_path.read_text()
          const_path.write_text(const.replace(
              'VERSION: Final = "8.3.2"',
              'VERSION: Final = "8.4.0"',
              1,
          ))

          manifest_path = component / 'manifest.json'
          manifest = json.loads(manifest_path.read_text())
          manifest['version'] = '8.4.0'
          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n')

          changelog_path = Path('CHANGELOG.md')
          changelog = changelog_path.read_text()
          entry = '''## 8.4.0

          - Replaced the fragile advanced merge selector with an external-entity-only physical-device setup that never offers the integration-owned Controller entity.
          - Saved options before scheduling the integration reload, preventing reload failures from becoming an opaque `Unknown error occurred` form response.
          - Began tracking every external media player for explicit assignment while keeping automatic TV/Cast grouping conservative.
          - Made the configured physical-device inventory authoritative for native media players, remotes, restart buttons, provider routing, and remote commands.
          - Collected native applications from linked source lists, active app metadata, learned apps, and provider configuration without manufacturer-specific profiles.
          - Kept automatic YouTube ad skipping positive-detection-only while giving the explicit manual action a separately reported remote-confirm attempt.
          - Added controller diagnostics for runtime version, native source entities, native application count, and manual ad-skip availability.
          - Preserved existing config entries, entity IDs, dashboard YAML, activities, routes, preferences, and Wake-on-LAN settings.

          '''.replace('          ', '')
          if '## 8.4.0\n' not in changelog:
              changelog_path.write_text(changelog.replace('# Changelog\n\n', '# Changelog\n\n' + entry, 1))

          for translation_path in (
              component / 'strings.json',
              component / 'translations' / 'en.json',
              component / 'translations' / 'pt.json',
          ):
              data = json.loads(translation_path.read_text())
              errors = data['options'].setdefault('error', {})
              abort = data['options'].setdefault('abort', {})
              if translation_path.name == 'pt.json':
                  errors['merge_failed'] = 'Não foi possível guardar a união dos dispositivos. Consulte os registos do Home Assistant.'
                  errors['inventory_save_failed'] = 'Não foi possível guardar as entidades do dispositivo. Consulte os registos do Home Assistant.'
                  abort['not_enough_source_entities'] = 'Não existem pelo menos duas entidades media_player externas disponíveis para unir.'
              else:
                  errors['merge_failed'] = 'The physical-device merge could not be saved. Check the Home Assistant logs.'
                  errors['inventory_save_failed'] = 'The physical-device entity inventory could not be saved. Check the Home Assistant logs.'
                  abort['not_enough_source_entities'] = 'At least two external media_player entities are required for a merge.'
              translation_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n')

          activation_path = Path('tests/test_v83_activation.py')
          activation = activation_path.read_text()
          activation = activation.replace('"8.3.2"', '"8.4.0"')
          activation = activation.replace('## 8.3.2', '## 8.4.0')
          activation = activation.replace(
              'self.assertIn("install_v831_patches()", registry)',
              'self.assertIn("install_v831_patches()", registry)\n        self.assertIn("install_v840_patches()", registry)',
              1,
          )
          activation = activation.replace(
              'self.assertIn("install_v83_options(ControllerOptionsFlow)", source)',
              'self.assertIn("install_v83_options(ControllerOptionsFlow)", source)\n        self.assertIn("install_v840_options(ControllerOptionsFlow)", source)',
              1,
          )
          activation_path.write_text(activation)

          Path('tests/test_v840_release.py').write_text('''"""Static regressions for the V8.4 physical-device setup release."""

          from __future__ import annotations

          import json
          import unittest
          from pathlib import Path

          ROOT = Path(__file__).parents[1]
          COMPONENT = ROOT / "custom_components" / "cast_attribute_sensors"


          class V840ReleaseTests(unittest.TestCase):
              def test_generated_controller_is_never_a_merge_candidate(self) -> None:
                  source = (COMPONENT / "v840_options.py").read_text()
                  self.assertIn("entry.platform == DOMAIN", source)
                  self.assertIn("_v840_external_media_options", source)

              def test_options_are_saved_before_reload(self) -> None:
                  source = (COMPONENT / "v840_options.py").read_text()
                  self.assertIn("OptionsFlow.async_create_entry", source)
                  self.assertIn("reload_when_saved", source)

              def test_explicit_generic_media_players_are_tracked(self) -> None:
                  source = (COMPONENT / "v840_patch.py").read_text()
                  self.assertIn("return False, False", source)
                  self.assertIn("SourceManager._classify = _classify", source)

              def test_native_apps_and_manual_skip_are_exposed(self) -> None:
                  source = (COMPONENT / "v840_patch.py").read_text()
                  self.assertIn('"runtime_release": "8.4.0"', source)
                  self.assertIn('"native_application_count"', source)
                  self.assertIn('"manual_remote_confirm_sent"', source)
                  self.assertIn('"automatic_positive_detection_only": True', source)

              def test_release_versions_match(self) -> None:
                  manifest = json.loads((COMPONENT / "manifest.json").read_text())
                  const = (COMPONENT / "const.py").read_text()
                  changelog = (ROOT / "CHANGELOG.md").read_text()
                  self.assertEqual(manifest["version"], "8.4.0")
                  self.assertIn('VERSION: Final = "8.4.0"', const)
                  self.assertIn("## 8.4.0", changelog)

              def test_v840_contains_no_vendor_specific_profiles(self) -> None:
                  content = "\\n".join(
                      (COMPONENT / name).read_text().casefold()
                      for name in ("v840_options.py", "v840_patch.py")
                  )
                  for forbidden in ("bravia", "sony", "samsung", "webos", "panasonic"):
                      with self.subTest(forbidden=forbidden):
                          self.assertNotIn(forbidden, content)


          if __name__ == "__main__":
              unittest.main()
          '''.replace('          ', ''))
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add custom_components CHANGELOG.md tests
          git commit -m 'Finalize Cast Metadata 8.4.0 metadata and regressions'
          git push origin HEAD:release/v8.4.0-reliable-device-setup
