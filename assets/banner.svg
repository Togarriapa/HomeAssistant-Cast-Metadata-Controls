      <rect x="890" y="300" width="180" height="52" rx="26" fill="#ffffff" opacity="0.10"/><text x="914" y="334">Dynamic apps</text>
      <rect x="1085" y="300" width="190" height="52" rx="26" fill="#ffffff" opacity="0.10"/><text x="1108" y="334">Lazy metadata</text>
      <rect x="1290" y="300" width="110" height="52" rx="26" fill="url(#accent)"/><text x="1317" y="334">HACS</text>
