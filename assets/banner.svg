<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
  <title id="title">Cast Metadata &amp; TV Controls</title>
  <desc id="desc">One physical device, one controller, every discovered sensor.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111727"/>
      <stop offset="1" stop-color="#37225f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#41aaff"/>
      <stop offset="0.5" stop-color="#3ce0d2"/>
      <stop offset="1" stop-color="#895cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1600" height="500" rx="36" fill="url(#bg)"/>
  <circle cx="1480" cy="40" r="250" fill="#41aaff" opacity="0.08"/>
  <circle cx="1340" cy="500" r="300" fill="#895cf6" opacity="0.10"/>
  <g transform="translate(90 95)" filter="url(#shadow)">
    <rect width="300" height="300" rx="62" fill="#141a2d"/>
    <rect x="48" y="55" width="204" height="142" rx="22" fill="none" stroke="#f6f9ff" stroke-width="12"/>
    <rect x="70" y="78" width="160" height="96" rx="12" fill="#18223a" stroke="#647da0" stroke-width="3"/>
    <rect x="94" y="104" width="106" height="12" rx="6" fill="#3ce0d2"/>
    <rect x="94" y="132" width="84" height="12" rx="6" fill="#895cf6"/>
    <rect x="94" y="160" width="64" height="10" rx="5" fill="#41aaff"/>
    <path d="M122 207l-10 30m66-30l10 30M95 242h110" stroke="#f6f9ff" stroke-width="12" stroke-linecap="round"/>
    <circle cx="48" cy="250" r="8" fill="#3ce0d2"/>
    <path d="M34 236a28 28 0 0128 28M22 224a46 46 0 0146 46" fill="none" stroke="#3ce0d2" stroke-width="8" stroke-linecap="round"/>
  </g>
  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="445" y="180" fill="#f6f9ff" font-size="72" font-weight="700">Cast Metadata &amp; TV Controls</text>
    <text x="448" y="245" fill="#b3c0d6" font-size="31">One physical device. One controller. Every discovered sensor.</text>
