launch_cast_app:
  name: Launch Cast app
  description: Launch a Google Cast receiver application by Cast app ID.
  fields:
    entity_id:
      name: Controller or Cast source
      required: true
      selector:
        entity:
          domain: media_player
          multiple: true
    app_id:
      name: Cast app ID
      required: true
      example: 233637DE
      selector:
        text:

launch_tv_app:
  name: Launch TV app
  description: Launch an Android or Google TV application by package ID.
  fields:
    entity_id:
      name: Controller or Android TV Remote source
      required: true
      selector:
        entity:
          domain: media_player
          multiple: true
    app_id:
      name: Package ID
      required: true
      example: com.google.android.youtube.tv
      selector:
        text:

register_tv_app:
  name: Register TV app
  description: Permanently add an Android TV package to a controller's app catalogue.
  fields:
    entity_id:
      name: Controller
      required: true
      selector:
        entity:
          domain: media_player
          integration: cast_attribute_sensors
          multiple: true
    app_id:
      name: Package ID
      required: true
      example: com.example.androidtv
      selector:
        text:
    app_name:
      name: Display name
      required: true
      example: Example TV App
      selector:
        text:

send_command:
  name: Send remote command
  description: Send a key command through the linked Android TV Remote entity.
  fields:
    entity_id:
      name: Controller
      required: true
      selector:
        entity:
          domain: media_player
          integration: cast_attribute_sensors
          multiple: true
    command:
      name: Command
      required: true
      example: HOME
      selector:
        text:

seek_relative:
  name: Seek relative
  description: Seek from the corrected live playback position.
  fields:
    entity_id:
      name: Controller
      required: true
      selector:
        entity:
          domain: media_player
          integration: cast_attribute_sensors
          multiple: true
    seconds:
      name: Seconds
      description: Positive values move forward; negative values rewind.
      required: true
      example: 10
      selector:
        number:
          min: -3600
          max: 3600
          mode: box

restart_device:
  name: Restart device
  description: Use a native restart button when available, otherwise perform a controlled power or receiver reset.
  fields:
    entity_id:
      name: Controller
      required: true
      selector:
        entity:
          domain: media_player
          integration: cast_attribute_sensors
          multiple: true
